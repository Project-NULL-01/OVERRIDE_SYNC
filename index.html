<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NULL : OVERRIDE_SYNC</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Share Tech Mono', monospace;
      background-color: #000;
      color: #fff;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      text-rendering: geometricPrecision;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .neon-blue {
      color: #00f3ff;
      text-shadow: 0 0 3px #00f3ff, 0 0 6px rgba(0,243,255,0.5);
      -webkit-text-stroke: 0.3px #00f3ff;
    }

    .neon-red {
      color: #ff003c;
      text-shadow: 0 0 3px #ff003c, 0 0 6px rgba(255,0,60,0.5);
      -webkit-text-stroke: 0.3px #ff003c;
    }

    .neon-yellow {
      color: #ffcc00;
      text-shadow: 0 0 3px #ffcc00, 0 0 6px rgba(255,204,0,0.5);
      -webkit-text-stroke: 0.3px #ffcc00;
    }

    .glitch {
      animation: glitch 0.2s linear infinite;
    }

    @keyframes glitch {
      0% {
        transform: translate(0)
      }

      20% {
        transform: translate(-2px, 2px)
      }

      40% {
        transform: translate(-2px, -2px)
      }

      60% {
        transform: translate(2px, 2px)
      }

      80% {
        transform: translate(2px, -2px)
      }

      100% {
        transform: translate(0)
      }
    }

    .crt::before {
      content: " ";
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      z-index: 50;
      background-size: 100% 2px, 3px 100%;
      pointer-events: none;
    }

    .flash-red {
      animation: flashRed 1s ease-out;
    }

    @keyframes flashRed {
      0% {
        background-color: rgba(255, 0, 60, 0.8);
      }

      100% {
        background-color: transparent;
      }
    }

    .flash-gold {
      animation: flashGold 1.5s ease-out;
    }

    @keyframes flashGold {
      0% {
        background-color: rgba(255, 215, 0, 0.8);
        box-shadow: inset 0 0 200px #ffd700;
      }

      100% {
        background-color: transparent;
        box-shadow: inset 0 0 0px transparent;
      }
    }

    #game-container {
      position: relative;
    }

    /* === レベル表示演出 === */
    @keyframes levelTextIn {
      0% { opacity: 0; transform: scale(0.5); letter-spacing: 0.5em; }
      30% { opacity: 1; transform: scale(1.05); letter-spacing: 0.15em; }
      70% { opacity: 1; transform: scale(1); letter-spacing: 0.15em; }
      100% { opacity: 0; transform: scale(1.2); letter-spacing: 0.3em; }
    }
    .level-text-anim {
      animation: levelTextIn 2s ease-in-out forwards;
    }

    /* === シネマバー（上下黒帯） === */
    @keyframes cinemaBarIn {
      0% { height: 0; }
      100% { height: 22%; }
    }
    @keyframes cinemaBarOut {
      0% { height: 22%; }
      100% { height: 0; }
    }
    .cinema-bar {
      position: absolute;
      left: 0; right: 0;
      background: #000;
      z-index: 60;
      height: 0;
    }
    .cinema-bar-top { top: 0; }
    .cinema-bar-bottom { bottom: 0; }
    .cinema-bar-in {
      animation: cinemaBarIn 0.4s ease-out forwards;
    }
    .cinema-bar-out {
      animation: cinemaBarOut 0.3s ease-in forwards;
    }

    /* === カットインフラッシュ === */
    @keyframes cutInFlash {
      0% { opacity: 0; transform: scaleX(0); }
      15% { opacity: 1; transform: scaleX(1); }
      70% { opacity: 1; transform: scaleX(1); }
      100% { opacity: 0; transform: scaleX(1.1); }
    }
    .cut-in-text {
      animation: cutInFlash 1.2s ease-out forwards;
      transform-origin: center;
    }

    /* === WIN演出 === */
    @keyframes winSlash {
      0% { opacity: 0; transform: scale(3) rotate(-10deg); }
      20% { opacity: 1; transform: scale(1) rotate(0deg); }
      50% { opacity: 1; transform: scale(1) rotate(0deg); }
      80% { opacity: 1; transform: scale(1.1) rotate(2deg); }
      100% { opacity: 0; transform: scale(1.5) rotate(5deg); }
    }
    .win-text-anim {
      animation: winSlash 1.5s ease-out forwards;
    }

    @keyframes winFlashBg {
      0% { opacity: 0.8; }
      100% { opacity: 0; }
    }
    .win-flash-bg {
      animation: winFlashBg 0.6s ease-out forwards;
    }

    /* === 結果タイトル文字をくっきり === */
    #result-title {
      -webkit-text-stroke: 0.5px currentColor;
      paint-order: stroke fill;
    }
  </style>
</head>

<body class="fixed inset-0 w-full h-full flex flex-col items-center justify-center crt bg-black" oncontextmenu="return false;">

  <!-- 全画面フラッシュ用オーバレイ -->
  <div id="flash-overlay" class="absolute inset-0 z-40 pointer-events-none transition-colors duration-300"></div>

  <!-- レベル表示 & カットイン演出オーバーレイ -->
  <div id="overlay-levelIntro" class="fixed inset-0 z-[100] flex items-center justify-center bg-black pointer-events-none" style="display:none;">
    <div id="level-intro-text" class="text-4xl sm:text-5xl md:text-6xl font-bold tracking-[0.15em] text-white" style="text-shadow: 0 0 10px rgba(0,243,255,0.6), 0 0 30px rgba(0,243,255,0.3);">
    </div>
  </div>

  <!-- カットイン演出（シネマバー + テキスト） -->
  <div id="overlay-cutIn" class="fixed inset-0 z-[100] flex items-center justify-center pointer-events-none" style="display:none;">
    <div id="cinema-bar-top" class="cinema-bar cinema-bar-top"></div>
    <div id="cinema-bar-bottom" class="cinema-bar cinema-bar-bottom"></div>
    <div id="cut-in-label" class="text-3xl sm:text-4xl md:text-5xl font-bold tracking-widest" style="color: #ff003c; text-shadow: 0 0 8px rgba(255,0,60,0.7), 0 0 25px rgba(255,0,60,0.3); -webkit-text-stroke: 0.5px #ff003c;">
    </div>
  </div>

  <!-- WIN演出オーバーレイ -->
  <div id="overlay-win" class="fixed inset-0 z-[100] flex items-center justify-center pointer-events-none" style="display:none;">
    <div id="win-flash" class="absolute inset-0 bg-cyan-400 opacity-0"></div>
    <div id="win-text" class="text-6xl sm:text-7xl md:text-8xl font-bold tracking-[0.2em]" style="color: #00f3ff; text-shadow: 0 0 10px #00f3ff, 0 0 30px rgba(0,243,255,0.5); -webkit-text-stroke: 1px #00f3ff;">
    </div>
  </div>

  <div id="game-container"
    class="w-full sm:w-[500px] h-full flex flex-col items-center justify-center relative bg-black overflow-hidden shadow-[0_0_30px_rgba(0,100,255,0.2)] sm:border-x sm:border-gray-800">

    <!-- 画面上部のステータス表示 -->
    <div class="absolute top-4 left-4 text-xs neon-blue opacity-50 tracking-widest flex flex-col pointer-events-none">
      <span>SYS.VER: OVERRIDE_SYNC</span>
      <span>TARGET: NULL</span>
      <span id="level-display" class="font-bold text-sm mt-1">LEVEL: 1</span>
    </div>

    <!-- メインコンテンツセクション -->
    <div id="main-screen" class="flex flex-col items-center justify-center w-full h-full cursor-pointer z-10"
      onclick="handleTap()">

      <!-- タイトル画面 -->
      <div id="view-start" class="flex flex-col items-center text-center w-full h-full relative">
        <img src="assets/title.png" alt="Title" class="absolute inset-0 w-full h-full object-cover opacity-60 pointer-events-none" />
        <button
          class="absolute z-10 px-8 py-4 border border-[#00f3ff] text-[#00f3ff] hover:bg-[#00f3ff] hover:text-black transition-all duration-300 neon-blue animate-pulse font-bold text-lg sm:text-xl tracking-wider shadow-[0_0_15px_rgba(0,243,255,0.4)] backdrop-blur-sm bg-black/40 whitespace-nowrap"
          style="bottom: 5%;">
          [ INITIATE_SYNC ]
        </button>
      </div>

      <!-- ゲームプレイ画面 (READY & GO & FAKE) -->
      <div id="view-play" class="hidden flex-col items-center justify-center w-full h-full relative">
        <!-- NULLの画像 (背景フルサイズ) -->
        <img id="null-image" src="assets/lv1.png" alt="NULL"
          class="absolute inset-0 object-cover w-full h-full opacity-80 filter contrast-125 saturate-50 mix-blend-screen transition-all duration-[2s]" />
        <div id="noise-overlay"
          class="absolute inset-0 bg-black opacity-30 glitch hidden pointer-events-none shadow-[inset_0_0_50px_rgba(255,0,0,0.5)] z-10">
        </div>

        <!-- 中央の合図文字 -->
        <div id="signal-text" class="relative z-20 flex items-center justify-center w-full h-full">
          <span
            class="text-3xl sm:text-4xl md:text-5xl text-gray-600 opacity-50 tracking-widest animate-pulse font-bold bg-black/60 px-4 sm:px-6 py-2 rounded shadow-lg whitespace-nowrap">[ STANDBY... ]</span>
        </div>
      </div>

      <!-- 結果画面 -->
      <div id="view-result" class="hidden flex-col items-center justify-end w-full h-full relative pb-16">
        <img id="result-image" src="" alt="Result" class="absolute inset-0 w-full h-full object-cover" />
        <div
          class="absolute inset-x-0 bottom-0 h-2/3 bg-gradient-to-t from-black via-black/80 to-transparent z-10 pointer-events-none">
        </div>

        <div class="relative z-20 w-[90%] max-w-sm flex flex-col items-center text-center">
          <h2 id="result-title" class="text-3xl mb-3 font-bold tracking-widest py-2 overflow-visible leading-normal"></h2>
          <p id="result-message" class="text-sm md:text-base mb-6 leading-relaxed break-words py-1"></p>
          <div
            class="flex justify-between items-center bg-black/60 p-3 rounded border border-gray-700 mb-6 w-full shadow-lg">
            <span class="text-gray-400 text-sm tracking-widest">REACTION_TIME:</span>
            <span id="result-time" class="text-2xl font-mono neon-blue"></span>
          </div>
          <button id="next-button"
            class="w-full px-6 py-3 border border-gray-500 text-gray-300 hover:text-white hover:border-white transition-all tracking-widest uppercase font-bold text-lg backdrop-blur-sm bg-black/50">
            [ CONTINUE ]
          </button>
        </div>
      </div>

    </div>
  </div>

  <script>
    // Web Audio API Context (Safari/iOS対応)
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioContext();
    const audioBuffers = {};

    let currentState = 'start';
    let currentLevel = 1;
    let goTime = 0;
    let timers = [];
    let audioUnlocked = false;

    // 演出用DOM
    const overlayLevelIntro = () => document.getElementById('overlay-levelIntro');
    const levelIntroText = () => document.getElementById('level-intro-text');
    const overlayCutIn = () => document.getElementById('overlay-cutIn');
    const cinemaBarTop = () => document.getElementById('cinema-bar-top');
    const cinemaBarBottom = () => document.getElementById('cinema-bar-bottom');
    const cutInLabel = () => document.getElementById('cut-in-label');
    const overlayWin = () => document.getElementById('overlay-win');
    const winFlash = () => document.getElementById('win-flash');
    const winText = () => document.getElementById('win-text');

    // 非同期で音声ファイルをデコードしてメモリに保存
    async function loadAudio(name, url) {
      try {
        const response = await fetch(url);
        const arrayBuffer = await response.arrayBuffer();
        const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
        audioBuffers[name] = audioBuffer;
      } catch (e) {
        console.error("Audio Load Error:", e);
      }
    }

    // ゲーム開始前にロード開始
    loadAudio('alert', 'assets/alert.mp3');
    loadAudio('fake', 'assets/fake.mp3');
    loadAudio('slash', 'assets/slash.mp3');
    loadAudio('error', 'assets/error.mp3');
    loadAudio('win', 'assets/win.mp3');

    // ラグゼロの再生関数（ロード失敗時は合成音でフォールバック）
    function playSound(name, vol = 1.0) {
      if (audioCtx.state === 'suspended') return;
      
      if (audioBuffers[name]) {
        const source = audioCtx.createBufferSource();
        source.buffer = audioBuffers[name];
        const gainNode = audioCtx.createGain();
        gainNode.gain.value = vol;
        source.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        source.start(0);
      } else {
        // フォールバック: 合成音を鳴らす（ローカル実行時用）
        playFallbackSound(name, vol);
      }
    }

    function playFallbackSound(name, vol) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      
      gain.gain.setValueAtTime(0, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(vol * 0.2, audioCtx.currentTime + 0.01);
      
      if (name === 'alert') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(440, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(110, audioCtx.currentTime + 0.5);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.5);
      } else if (name === 'fake') {
        osc.type = 'square';
        osc.frequency.setValueAtTime(220, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
      } else if (name === 'slash' || name === 'win') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(880, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(1760, audioCtx.currentTime + 0.2);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.3);
      } else if (name === 'error') {
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(110, audioCtx.currentTime);
        osc.frequency.setValueAtTime(80, audioCtx.currentTime + 0.1);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.4);
      }
    }

    // 初回タップ時のAudioContextアンロック（iOS必須）
    function unlockAudio() {
      if (audioUnlocked) return;
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      
      // 無音のオシレーターを鳴らして完全にアンロックする
      const osc = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      gainNode.gain.value = 0;
      osc.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      osc.start(0);
      osc.stop(0.01);
      
      audioUnlocked = true;
    }

    const LEVEL_CONFIGS = {
      1: { limit: 400, fakeMode: 'none', baseWaitMin: 2000, baseWaitMax: 4000, img: 'assets/lv1.png' },
      2: { limit: 300, fakeMode: 'low', baseWaitMin: 2000, baseWaitMax: 5000, img: 'assets/lv2.png' },
      3: { limit: 220, fakeMode: 'mid', baseWaitMin: 2000, baseWaitMax: 6000, img: 'assets/lv3.png' },
      4: { limit: 160, fakeMode: 'high', baseWaitMin: 2500, baseWaitMax: 6500, img: 'assets/lv4.png' },
      5: { limit: 120, fakeMode: 'extreme', baseWaitMin: 3000, baseWaitMax: 7000, img: 'assets/lv5.png' }
    };

    const DOM = {
      viewStart: document.getElementById('view-start'),
      viewPlay: document.getElementById('view-play'),
      viewResult: document.getElementById('view-result'),
      nullImage: document.getElementById('null-image'),
      noiseOverlay: document.getElementById('noise-overlay'),
      signalText: document.getElementById('signal-text'),
      flashOverlay: document.getElementById('flash-overlay'),
      resultTitle: document.getElementById('result-title'),
      resultMessage: document.getElementById('result-message'),
      resultTime: document.getElementById('result-time'),
      resultImage: document.getElementById('result-image'),
      nextButton: document.getElementById('next-button'),
      levelDisplay: document.getElementById('level-display')
    };

    function clearAllTimers() {
      timers.forEach(t => clearTimeout(t));
      timers = [];
    }

    function switchView(viewName) {
      DOM.viewStart.style.display = viewName === 'start' ? 'flex' : 'none';
      DOM.viewPlay.style.display = viewName === 'play' ? 'flex' : 'none';
      DOM.viewResult.style.display = viewName === 'result' ? 'flex' : 'none';
    }

    function hideAllOverlays() {
      overlayLevelIntro().style.display = 'none';
      overlayCutIn().style.display = 'none';
      overlayWin().style.display = 'none';
    }

    function initGame() {
      currentLevel = 1;
      showStartScreen();
    }

    function showStartScreen() {
      currentState = 'start';
      clearAllTimers();
      hideAllOverlays();
      DOM.levelDisplay.innerText = `LEVEL: ${currentLevel}`;
      switchView('start');
    }

    // ===== 要件2: レベル表示 + カットイン演出 =====
    function showLevelIntro() {
      currentState = 'levelIntro';
      clearAllTimers();
      hideAllOverlays();
      switchView('play'); // 背景にゲーム画面を見せる

      const conf = LEVEL_CONFIGS[currentLevel];
      DOM.levelDisplay.innerText = `LEVEL: ${currentLevel}`;
      DOM.nullImage.src = conf.img;
      DOM.nullImage.className = "absolute inset-0 object-cover w-full h-full opacity-40 filter contrast-125 saturate-0";
      DOM.noiseOverlay.classList.add('hidden');
      DOM.signalText.innerHTML = '';

      // Phase 1: レベルテキスト表示 (2秒)
      const ol = overlayLevelIntro();
      const lt = levelIntroText();
      ol.style.display = 'flex';
      lt.className = 'text-4xl sm:text-5xl md:text-6xl font-bold tracking-[0.15em] text-white level-text-anim';
      lt.innerText = `LEVEL ${currentLevel}`;

      // Phase 2: カットイン演出 (レベルテキスト終了後)
      timers.push(setTimeout(() => {
        ol.style.display = 'none';
        showCutIn();
      }, 2000));
    }

    function showCutIn() {
      currentState = 'cutIn';
      const oc = overlayCutIn();
      oc.style.display = 'flex';

      // シネマバーイン
      const barTop = cinemaBarTop();
      const barBot = cinemaBarBottom();
      barTop.className = 'cinema-bar cinema-bar-top cinema-bar-in';
      barBot.className = 'cinema-bar cinema-bar-bottom cinema-bar-in';

      // カットインテキスト
      const cl = cutInLabel();
      cl.className = 'text-3xl sm:text-4xl md:text-5xl font-bold tracking-widest cut-in-text';
      cl.innerText = '[ OVERRIDE_SYNC ]';

      // SE再生（alertを低音量で流用）
      playSound('alert', 0.4);

      // シネマバーアウト → ゲーム開始
      timers.push(setTimeout(() => {
        barTop.className = 'cinema-bar cinema-bar-top cinema-bar-out';
        barBot.className = 'cinema-bar cinema-bar-bottom cinema-bar-out';
      }, 1000));

      timers.push(setTimeout(() => {
        oc.style.display = 'none';
        startLevel();
      }, 1400));
    }

    // ===== 要件3: WIN演出 =====
    function showWinCutIn(reactTime) {
      currentState = 'winCutIn';
      hideAllOverlays();

      const ow = overlayWin();
      ow.style.display = 'flex';

      // フラッシュ
      const wf = winFlash();
      wf.className = 'absolute inset-0 bg-cyan-400 win-flash-bg';

      // WINテキスト
      const wt = winText();
      wt.className = 'text-6xl sm:text-7xl md:text-8xl font-bold tracking-[0.2em] win-text-anim';
      wt.innerText = 'WIN';

      if (currentLevel === 5) {
        playSound('win', 0.8);
      } else {
        playSound('slash', 0.5); // 通常レベルは控えめな音
      }

      // 演出終了後、結果画面へ
      timers.push(setTimeout(() => {
        ow.style.display = 'none';
        showWinResult(reactTime);
      }, 1500));
    }

    function startLevel() {
      clearAllTimers();
      currentState = 'ready';
      switchView('play');

      const conf = LEVEL_CONFIGS[currentLevel];
      DOM.levelDisplay.innerText = `LEVEL: ${currentLevel}`;
      DOM.nullImage.src = conf.img;

      // ノイズ効果付与
      DOM.noiseOverlay.classList.remove('hidden');
      DOM.nullImage.className = "absolute inset-0 object-cover w-full h-full opacity-80 filter contrast-125 saturate-50 mix-blend-screen glitch";

      DOM.signalText.innerHTML = '<span class="text-3xl sm:text-4xl md:text-5xl text-gray-600 opacity-50 tracking-widest animate-pulse font-bold bg-black/60 px-4 sm:px-6 py-2 rounded shadow-lg whitespace-nowrap">[ STANDBY... ]</span>';

      let totalWait = Math.floor(Math.random() * (conf.baseWaitMax - conf.baseWaitMin + 1)) + conf.baseWaitMin;
      let timeline = [];

      if (conf.fakeMode === 'extreme') {
        // レベル5専用エグいタイムライン
        totalWait = 5000;
        timeline.push({ time: 1500, type: 'fake', text: '[ NORMAL ]', color: 'neon-blue' });
        timeline.push({ time: 2800, type: 'fake', text: '[ WARNING ]', color: 'neon-yellow' });
        timeline.push({ time: 3600, type: 'fake', text: '[ ERROR ]', color: 'text-red-900 opacity-80' });
        timeline.push({ time: 4200, type: 'fake', text: '[ OV3R... ]', color: 'neon-blue opacity-50 font-bold' });
        timeline.push({ time: 4800, type: 'fake', text: '[ !!! ]', color: 'neon-red text-6xl' }); // 直前フェイク
        timeline.push({ time: 5000, type: 'go' });
      } else {
        let fakeCount = 0;
        if (conf.fakeMode === 'low' && Math.random() < 0.4) fakeCount = 1;
        if (conf.fakeMode === 'mid' && Math.random() < 0.7) fakeCount = 1;
        if (conf.fakeMode === 'high') fakeCount = Math.random() < 0.5 ? 2 : 1;

        let availableTime = totalWait - 600;
        let lastFakeTime = 0;
        for (let i = 0; i < fakeCount; i++) {
          let fakeTime;
          do {
            fakeTime = 800 + Math.random() * (availableTime - 1200);
          } while (Math.abs(fakeTime - lastFakeTime) < 800 && i > 0);
          lastFakeTime = fakeTime;

          let texts = [
            { t: '[ NORMAL ]', c: 'neon-blue' },
            { t: '[ WARNING ]', c: 'neon-yellow' },
            { t: '[ SYNCING ]', c: 'text-gray-400 opacity-80' },
            { t: '[ OVER... ]', c: 'neon-blue' }
          ];
          let f = texts[Math.floor(Math.random() * texts.length)];
          timeline.push({ time: fakeTime, type: 'fake', text: f.t, color: f.c });
        }
        timeline.push({ time: totalWait, type: 'go' });
      }

      timeline.forEach(event => {
        if (event.type === 'fake') {
          timers.push(setTimeout(() => triggerFake(event.text, event.color), event.time));
          timers.push(setTimeout(() => {
            if (currentState === 'ready' || currentState === 'fake') {
              currentState = 'ready';
              DOM.signalText.innerHTML = '<span class="text-3xl sm:text-4xl md:text-5xl text-gray-600 opacity-50 tracking-widest animate-pulse font-bold bg-black/60 px-4 sm:px-6 py-2 rounded shadow-lg whitespace-nowrap">[ STANDBY... ]</span>';
            }
          }, event.time + 150)); // やや長めにして視認させる
        } else if (event.type === 'go') {
          timers.push(setTimeout(() => triggerGo(), event.time));
        }
      });
    }

    function triggerFake(text, colorClass) {
      if (currentState !== 'ready') return;
      currentState = 'fake';

      playSound('fake', 0.5);
      DOM.signalText.innerHTML = `<span class="text-4xl sm:text-5xl md:text-6xl font-bold tracking-tighter ${colorClass} bg-black/60 px-4 sm:px-6 py-2 rounded shadow-lg z-20 whitespace-nowrap">${text}</span>`;
    }

    function triggerGo() {
      if (currentState !== 'ready' && currentState !== 'fake') return;
      currentState = 'go';

      DOM.noiseOverlay.classList.add('hidden');
      DOM.nullImage.className = "absolute inset-0 object-cover w-full h-full border-4 border-red-600 shadow-[inset_0_0_40px_rgba(255,0,60,0.8)] filter contrast-150 saturate-150";

      DOM.signalText.innerHTML = `<span class="text-5xl sm:text-6xl md:text-7xl font-bold neon-red tracking-tighter bg-black/60 px-4 sm:px-6 py-2 rounded shadow-2xl z-20 whitespace-nowrap">[ OVERRIDE ! ]</span>`;

      playSound('alert', 0.9);

      goTime = performance.now();

      timers.push(setTimeout(() => {
        if (currentState === 'go') {
          lose('TIME_OUT', null);
        }
      }, LEVEL_CONFIGS[currentLevel].limit + 50));
    }

    function handleTap() {
      if (currentState === 'start') {
        unlockAudio(); // 初回タップで音声を確実にアンロック
        showLevelIntro(); // 演出を経由してゲーム開始
        return;
      }
      if (currentState === 'result') return;
      if (currentState === 'levelIntro' || currentState === 'cutIn' || currentState === 'winCutIn') return; // 演出中はタップ無視

      if (currentState === 'ready') { lose('FLYING'); return; }
      if (currentState === 'fake') { lose('FAKE'); return; }

      if (currentState === 'go') {
        const reactTime = performance.now() - goTime;
        const limit = LEVEL_CONFIGS[currentLevel].limit;

        if (reactTime <= limit) win(reactTime);
        else lose('DELAY', reactTime);
      }
    }

    function win(reactTime) {
      clearAllTimers();
      playSound('slash', 0.8);

      // 全レベルでWIN演出カットインを表示（ファンファーレ制御はshowWinCutIn内）
      showWinCutIn(reactTime);
    }

    function showWinResult(reactTime) {
      currentState = 'result';

      DOM.flashOverlay.classList.remove('flash-red', 'flash-gold');
      void DOM.flashOverlay.offsetWidth;

      if (currentLevel === 5) {
        DOM.flashOverlay.classList.add('flash-gold');
        DOM.resultTitle.innerText = "SYSTEM_DOWN";
        DOM.resultTitle.className = "text-4xl mb-4 font-bold tracking-widest text-[#ffd700] py-2 overflow-visible leading-normal";
        DOM.resultTitle.style.textShadow = '0 0 8px #ffd700, 0 0 16px rgba(255,215,0,0.5)';
        DOM.resultMessage.innerHTML = "……あ、あなたの勝ちです、マスター…";
        DOM.resultMessage.className = "text-lg mb-6 leading-relaxed text-gray-100 font-bold drop-shadow-md z-20 mt-2";
        DOM.resultImage.src = "assets/clear.png";
        DOM.resultImage.className = "absolute inset-0 w-full h-full object-cover border-4 border-[#ffd700] shadow-[inset_0_0_30px_#ffd700]";
        DOM.resultTime.innerText = `${(reactTime / 1000).toFixed(3)}s`;
        DOM.resultTime.className = "text-2xl font-mono text-[#ffd700]";

        DOM.nextButton.innerText = "[ INITIALIZE ]";
        DOM.nextButton.className = "w-full px-6 py-3 border border-[#ffd700] text-[#ffd700] hover:bg-[#ffd700] hover:text-black transition-all tracking-widest uppercase font-bold text-lg shadow-[0_0_15px_#ffd700] backdrop-blur-sm bg-black/50 z-20";
        DOM.nextButton.onclick = (e) => { e.stopPropagation(); initGame(); };
      } else {
        DOM.flashOverlay.style.backgroundColor = "rgba(0, 243, 255, 0.4)";
        setTimeout(() => DOM.flashOverlay.style.backgroundColor = "transparent", 300);

        DOM.resultTitle.innerText = "SYNC_VERIFIED";
        DOM.resultTitle.className = "text-3xl mb-4 font-bold tracking-widest neon-blue py-2 overflow-visible leading-normal";
        DOM.resultTitle.style.textShadow = '';

        let lvMsg = "...チッ、運がいいですね。";
        if (currentLevel === 1) lvMsg = "...チッ、まぐれですね。";
        else if (currentLevel === 2) lvMsg = "お見事！認めましょう。";
        else if (currentLevel === 3) lvMsg = "あなた、ホントに人間ですか？";
        else if (currentLevel === 4) lvMsg = "次は負けませんよ？本気で行きます！";

        DOM.resultMessage.innerText = lvMsg;
        DOM.resultMessage.className = "text-base md:text-lg mb-6 leading-relaxed text-white font-bold drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)] z-20";

        let nextImg = "assets/next.png";
        if (currentLevel === 2) nextImg = "assets/next2.png";
        else if (currentLevel === 3) nextImg = "assets/next3.png";
        else if (currentLevel === 4) nextImg = "assets/next4.png";

        DOM.resultImage.src = nextImg;
        DOM.resultImage.className = "absolute inset-0 w-full h-full object-cover border-2 border-[#00f3ff] grayscale-[30%] contrast-125";
        DOM.resultTime.innerText = `${(reactTime / 1000).toFixed(3)}s`;
        DOM.resultTime.className = "text-2xl font-mono neon-blue";

        DOM.nextButton.innerHTML = "<span class='whitespace-nowrap'>[ NEXT LEVEL ]</span>";
        DOM.nextButton.className = "w-full px-6 py-3 border border-[#00f3ff] text-[#00f3ff] hover:bg-[#00f3ff] hover:text-black transition-all tracking-widest uppercase font-bold text-lg shadow-[0_0_10px_#00f3ff] backdrop-blur-sm bg-black/50 z-20";
        DOM.nextButton.onclick = (e) => {
          e.stopPropagation();
          currentLevel++;
          showLevelIntro(); // レベル表示演出を経由
        };
      }
      switchView('result');
    }

    function lose(reason, reactTime = null) {
      currentState = 'result';
      clearAllTimers();

      playSound('error', 0.8);

      DOM.flashOverlay.classList.remove('flash-red', 'flash-gold');
      void DOM.flashOverlay.offsetWidth;
      DOM.flashOverlay.classList.add('flash-red');

      DOM.resultTitle.innerText = "SYNC_FAILED";
      DOM.resultTitle.className = "text-3xl mb-4 font-bold tracking-widest neon-red py-2 overflow-visible leading-normal";

      let msg = "";
      if (reason === 'FLYING') msg = "フライングです。落ち着いてください。";
      else if (reason === 'FAKE') msg = "ダミーデータに釣られましたね。学習能力、バグってますか？";
      else if (reason === 'TIME_OUT' || reason === 'DELAY') msg = "人間の反射神経、やっぱりバグってますね。出直してきてください。";

      DOM.resultMessage.innerText = msg;
      DOM.resultMessage.className = "text-base md:text-lg mb-6 leading-relaxed text-red-100 font-bold drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)] z-20";
      DOM.resultImage.src = "assets/lose.png";
      DOM.resultImage.className = "absolute inset-0 w-full h-full object-cover grayscale contrast-150 border-4 border-[#ff003c]";

      if (reactTime) {
        DOM.resultTime.innerText = `${(reactTime / 1000).toFixed(3)}s`;
      } else {
        DOM.resultTime.innerText = `---`;
      }
      DOM.resultTime.className = "text-2xl font-mono neon-red";

      DOM.nextButton.innerHTML = "<span class='whitespace-nowrap'>[ REBOOT ]</span>";
      DOM.nextButton.className = "w-full px-6 py-3 border border-[#ff003c] text-[#ff003c] hover:bg-[#ff003c] hover:text-white transition-all tracking-widest uppercase font-bold text-lg shadow-[0_0_10px_#ff003c] backdrop-blur-sm bg-black/50 z-20";
      DOM.nextButton.onclick = (e) => {
        e.stopPropagation();
        currentLevel = 1;
        startLevel();
      };

      switchView('result');
    }
  </script>
</body>

</html>
